<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PinStack</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"
        />
        <link rel="stylesheet" href="./assets/css/index.css" />
        <script src="./assets/js/index.js"></script>
    </head>
    <body>
        <header class="topbar">
            <div class="logo">
                <i class="ph ph-push-pin"></i>
                PinStack
            </div>
            <div class="topbar-right">
                <span class="badge"><i class="ph ph-lightning"></i> Dev</span>
                <button class="btn" onclick="toggleCreate()" id="createBtn">
                    <i class="ph ph-plus"></i> Novo pin
                </button>
                <button
                    class="btn theme-btn"
                    id="themeBtn"
                    onclick="toggleTheme()"
                    title="Alternar tema"
                >
                    <i class="ph ph-moon" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <main class="content">
            <div class="create-wrap" id="createWrap">
                <div class="create-head" onclick="toggleCreate()">
                    <h2><i class="ph ph-pencil-simple"></i> Criar pin</h2>
                    <span class="chevron" id="chevron"
                        ><i class="ph ph-caret-up"></i
                    ></span>
                </div>
                <div class="create-body" id="createBody">
                    <div class="fields">
                        <input
                            type="text"
                            id="titleInput"
                            placeholder="Título (mín. 3 letras)"
                        />
                        <input
                            type="text"
                            id="descInput"
                            placeholder="Descrição"
                        />
                        <input
                            type="text"
                            id="urlInput"
                            placeholder="URL da imagem"
                        />
                    </div>
                    <div class="create-foot">
                        <button class="btn" onclick="toggleCreate()">
                            Cancelar
                        </button>
                        <button class="btn btn-red" onclick="criarPin()">
                            <i class="ph ph-paper-plane-tilt"></i> Enviar
                            mutation
                        </button>
                    </div>
                </div>
            </div>

            <div class="section-head">
                <h2>Feed principal</h2>
                <button class="btn" onclick="loadFeed()">
                    <i class="ph ph-arrows-clockwise"></i> Atualizar
                </button>
            </div>
            <div id="feedContainer"></div>
        </main>

        <div class="toast-area" id="toastArea"></div>
    </body>
</html>
